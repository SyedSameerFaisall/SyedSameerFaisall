<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.45" stop-color="#0B1224"/>
      <stop offset="1" stop-color="#120A24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="skewX(-30) scale(1 .55)">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1E293B" stroke-width="0.8" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#grid)" opacity="0.35"/>

  <!-- floating particles -->
  <circle cx="120" cy="48" r="2" fill="#38BDF8" opacity="0.7"/>
  <circle cx="780" cy="62" r="2.5" fill="#FBBF24" opacity="0.8"/>
  <circle cx="640" cy="38" r="1.8" fill="#A855F7" opacity="0.75"/>
  <circle cx="260" cy="72" r="1.5" fill="#34D399" opacity="0.7"/>

  <!-- isometric platform -->
  <path d="M120 210 L450 90 L780 210 L450 330Z" fill="#0F172A" stroke="#334155" stroke-width="1.2"/>
  <path d="M120 210 L450 90 L450 330 L120 210Z" fill="#111827" opacity="0.9"/>
  <path d="M450 90 L780 210 L450 330 L450 90Z" fill="#1E293B" opacity="0.85"/>

  <!-- contribution blocks -->
  <g filter="url(#glow)">
    <path d="M300 188 L340 168 L380 188 L340 208Z" fill="url(#cyan)"/>
    <path d="M300 188 L340 168 L340 208 L300 188Z" fill="#1D4ED8"/>
    <path d="M340 168 L380 188 L340 208 L340 168Z" fill="#2563EB"/>

    <path d="M380 188 L420 168 L460 188 L420 208Z" fill="url(#gold)"/>
    <path d="M380 188 L420 168 L420 208 L380 188Z" fill="#B45309"/>
    <path d="M420 168 L460 188 L420 208 L420 168Z" fill="#D97706"/>

    <path d="M460 188 L500 168 L540 188 L500 208Z" fill="url(#purple)"/>
    <path d="M460 188 L500 168 L500 208 L460 188Z" fill="#6D28D9"/>
    <path d="M500 168 L540 188 L500 208 L500 168Z" fill="#7C3AED"/>

    <path d="M520 168 L560 148 L600 168 L560 188Z" fill="url(#cyan)"/>
    <path d="M520 168 L560 148 L560 188 L520 168Z" fill="#0891B2"/>
    <path d="M560 148 L600 168 L560 188 L560 148Z" fill="#06B6D4"/>
  </g>

  <!-- candlestick chart -->
  <g transform="translate(610,118)">
    <line x1="18" y1="58" x2="18" y2="18" stroke="#64748B" stroke-width="2"/>
    <rect x="12" y="28" width="12" height="22" fill="#34D399"/>
    <line x1="42" y1="62" x2="42" y2="22" stroke="#64748B" stroke-width="2"/>
    <rect x="36" y="38" width="12" height="18" fill="#F87171"/>
    <line x1="66" y1="52" x2="66" y2="12" stroke="#64748B" stroke-width="2"/>
    <rect x="60" y="18" width="12" height="26" fill="#34D399"/>
    <line x1="90" y1="48" x2="90" y2="8" stroke="#64748B" stroke-width="2"/>
    <rect x="84" y="12" width="12" height="28" fill="#34D399"/>
    <path d="M8 66 Q38 52 68 40 T128 18" stroke="#FBBF24" stroke-width="2.2" fill="none" opacity="0.9"/>
  </g>

  <!-- neural network -->
  <g opacity="0.95">
    <circle cx="170" cy="118" r="10" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="130" cy="158" r="8" fill="#1E293B" stroke="#818CF8" stroke-width="2"/>
    <circle cx="210" cy="158" r="8" fill="#1E293B" stroke="#C084FC" stroke-width="2"/>
    <circle cx="170" cy="198" r="10" fill="#1E293B" stroke="#34D399" stroke-width="2"/>
    <line x1="170" y1="128" x2="130" y2="150" stroke="#475569" stroke-width="1.5"/>
    <line x1="170" y1="128" x2="210" y2="150" stroke="#475569" stroke-width="1.5"/>
    <line x1="130" y1="166" x2="170" y2="188" stroke="#475569" stroke-width="1.5"/>
    <line x1="210" y1="166" x2="170" y2="188" stroke="#475569" stroke-width="1.5"/>
    <circle cx="170" cy="118" r="3" fill="#38BDF8"/>
    <circle cx="170" cy="198" r="3" fill="#34D399"/>
  </g>

  <!-- code brackets -->
  <text x="700" y="228" fill="#94A3B8" font-family="Consolas, monospace" font-size="28" font-weight="700">&lt;/&gt;</text>
  <text x="748" y="228" fill="#FBBF24" font-family="Consolas, monospace" font-size="22" font-weight="700">{ }</text>

  <!-- labels -->
  <text x="450" y="42" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">SWE · Data Science · Quant Finance</text>
  <text x="450" y="68" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="13">Building agents, models, and market-aware systems</text>

  <!-- accent lines -->
  <rect x="318" y="248" width="264" height="3" rx="1.5" fill="url(#cyan)" opacity="0.8"/>
</svg>
